name: Quarto Publish

on:
  push:
    branches: [ main ]  # 当你向 main 分支推送代码时自动触发
  workflow_dispatch:    # 允许你在 GitHub 网页上点击按钮手动触发

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 必须开启写入权限，允许机器人把生成的网页推送到仓库

    steps:
      - name: 1. 检出代码 (Check out repository)
        uses: actions/checkout@v4

      - name: 2. 安装 Quarto (Set up Quarto)
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 3. 安装 R 语言环境 (Install R)
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: 4. 安装 R 包 (Install R Packages)
        run: |
          Rscript -e 'install.packages(c("rmarkdown", "knitr", "reticulate", "ggplot2", "dplyr", "tidyr", "tibble"))'

      - name: 5. 安装 Python 环境 (Set up Python)
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 6. 安装 Python 包 (Install Python Packages)
        run: pip install numpy pandas matplotlib

      - name: 7. 渲染页面并发布到 GitHub Pages (Render and Publish)
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages  # 自动将网页生成到一个叫 gh-pages 的隐藏分支
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RETICULATE_PYTHON: ${{ env.pythonLocation }}/bin/python
